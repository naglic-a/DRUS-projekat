services:
  db:
    image: postgres:15-alpine
    container_name: drus_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: drus_aleksa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # pathOnMyPc:pathInContainer
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # initializes db with needed tables
    restart: always

  primary:
    build:
      context: .
      dockerfile: Server.Dockerfile
    container_name: drus_primary_server
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always

  sensore-1:
    build:
      context: .
      dockerfile: Sensor.Dockerfile
    container_name: drus_sensor_1
    environment:
      - SERVER_HOST=primary
      - SENSOR_ID=01
    depends_on:
      - primary
    restart: always

volumes:
  pgdata: